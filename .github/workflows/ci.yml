name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - "front/**"

jobs:
  verify:
    name: install, test, lint, build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.11.1"
          cache: npm

      - name: Verify Node.js version
        run: node -v

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Run lint
        run: npm run lint

      - name: Run build
        run: npm run build
