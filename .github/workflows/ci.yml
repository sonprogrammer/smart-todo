name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - "backend/**"
      - "front/**"

jobs:
  verify:
    name: npm verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.11.1
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Test
        run: npm test

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
